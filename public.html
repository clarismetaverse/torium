<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TORIUM Public Triage</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --panel: #fffaf0;
      --panel-2: #ffffff;
      --ink: #171717;
      --muted: #716b61;
      --line: #dfd5c5;
      --accent: #151515;
      --good: #106b3b;
      --warn: #9a5a00;
      --bad: #9b1c1c;
      --chip: #eee4d3;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
    }

    aside {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 18px;
      overflow-y: auto;
      max-height: 100vh;
      position: sticky;
      top: 0;
    }

    main { padding: 22px; overflow: auto; }

    .brand { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .brand h1 { font-size: 20px; margin: 0; letter-spacing: -0.02em; }
    .brand span { font-size: 12px; color: var(--muted); }

    .notice, .controls, .summary, .result-item, .detail-block, .metric {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
    }

    .notice { padding: 12px; margin-bottom: 12px; color: var(--muted); font-size: 13px; line-height: 1.35; }
    .controls { padding: 12px; margin-bottom: 12px; }
    .summary { padding: 12px; margin-bottom: 12px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .spaced { justify-content: space-between; }

    select, button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 12px;
      padding: 9px 10px;
      font: inherit;
    }
    select { width: 100%; margin-top: 8px; }
    button { cursor: pointer; transition: transform .08s ease, background .15s ease; }
    button:hover { background: #f8f2e8; }
    button:active { transform: scale(.98); }
    button.primary { background: var(--accent); color: white; border-color: var(--accent); }

    .stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 10px; }
    .stat { padding: 10px; background: #f9f4ea; border-radius: 14px; border: 1px solid #eadfcd; }
    .stat b { display: block; font-size: 18px; }
    .stat span { font-size: 12px; color: var(--muted); }

    .result-list { display: grid; gap: 10px; }
    .result-item { padding: 12px; cursor: pointer; }
    .result-item.active { outline: 2px solid #111; }
    .result-item h3 { margin: 0 0 8px; font-size: 14px; line-height: 1.25; }

    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip { font-size: 11px; padding: 5px 7px; border-radius: 999px; background: var(--chip); color: #2f2a22; white-space: nowrap; }
    .chip.good { background: #dff3e7; color: var(--good); }
    .chip.warn { background: #fff1d3; color: var(--warn); }
    .chip.bad { background: #ffe1de; color: var(--bad); }

    .hero { display: grid; grid-template-columns: minmax(0, 1fr); gap: 18px; align-items: start; margin-bottom: 16px; }
    .hero h2 { font-size: clamp(25px, 4vw, 44px); line-height: 0.98; letter-spacing: -0.055em; margin: 0 0 12px; }

    .meta-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin: 16px 0; }
    .metric { padding: 14px; }
    .metric span { color: var(--muted); font-size: 12px; display: block; }
    .metric b { font-size: 22px; display: block; margin-top: 4px; }

    .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .detail-block { padding: 16px; }
    .detail-block h3 { margin: 0 0 10px; font-size: 16px; }
    .detail-block ul { margin: 0; padding-left: 18px; }
    .detail-block li { margin: 6px 0; line-height: 1.35; }
    .muted { color: var(--muted); }
    .empty { padding: 36px; color: var(--muted); text-align: center; }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      aside { position: static; max-height: unset; border-right: 0; border-bottom: 1px solid var(--line); }
      .detail-grid { grid-template-columns: 1fr; }
      .meta-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <div>
          <h1>TORIUM Public</h1>
          <span>Redacted deal browser</span>
        </div>
        <button id="refreshButton" title="Refresh outputs">↻</button>
      </div>

      <div class="notice">
        Public view: exact addresses and external listing links are hidden.
      </div>

      <div class="controls">
        <div class="row spaced">
          <button id="prevButton">← Prev</button>
          <button id="nextButton" class="primary">Next →</button>
        </div>
        <select id="outputSelect"></select>
      </div>

      <div class="summary" id="summary"></div>
      <div class="result-list" id="resultList"></div>
    </aside>

    <main id="main">
      <div class="empty">Load a triage run to start.</div>
    </main>
  </div>

  <script>
    const state = { outputs: [], output: null, results: [], selectedIndex: 0 };
    const els = {
      outputSelect: document.getElementById('outputSelect'),
      resultList: document.getElementById('resultList'),
      summary: document.getElementById('summary'),
      main: document.getElementById('main'),
      refreshButton: document.getElementById('refreshButton'),
      prevButton: document.getElementById('prevButton'),
      nextButton: document.getElementById('nextButton'),
    };

    const money = new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
    const number = new Intl.NumberFormat('it-IT');
    const params = new URLSearchParams(window.location.search);
    const requestedRun = params.get('run_id') || params.get('run') || null;

    function formatMoney(value) { return Number.isFinite(Number(value)) ? money.format(Number(value)) : '—'; }
    function formatNumber(value, suffix = '') { return Number.isFinite(Number(value)) ? `${number.format(Number(value))}${suffix}` : '—'; }
    function deriveResults(output) {
      if (Array.isArray(output?.results) && output.results.length) return output.results;
      if (Array.isArray(output?.result_links)) return output.result_links;
      return [];
    }
    function listingOf(result) { return result?.listing || result || {}; }
    function getTitle(result) {
      const listing = listingOf(result);
      return result?.title || listing?.suggestedTexts?.title || listing?.title || listing?.area_label || 'Redacted property';
    }
    function getArea(result) {
      const listing = listingOf(result);
      return listing.listing_area || listing.area_label || listing.neighborhood || listing.district || result?.listing_area || result?.area || result?.query_area || 'Milano';
    }
    function getActionClass(action) {
      if (!action) return '';
      if (String(action).includes('discard') || String(action).includes('filtered')) return 'bad';
      if (String(action).includes('request')) return 'warn';
      return 'good';
    }
    function renderArray(title, items, klass = '') {
      if (!Array.isArray(items) || !items.length) return '';
      return `<section class="detail-block ${klass}"><h3>${title}</h3><ul>${items.map((item) => `<li>${String(item)}</li>`).join('')}</ul></section>`;
    }

    async function loadOutputList() {
      const response = await fetch('/api/outputs');
      const data = await response.json();
      state.outputs = data.outputs || [];
      renderOutputSelect();
      if (requestedRun) {
        await loadOutputById(requestedRun.startsWith('supabase:') ? requestedRun : `supabase:${requestedRun}`);
      } else if (state.outputs.length) {
        await loadOutputById(state.outputs[0].id);
      }
    }

    function renderOutputSelect() {
      els.outputSelect.innerHTML = '';
      if (!state.outputs.length) {
        els.outputSelect.innerHTML = '<option>No outputs found</option>';
        return;
      }
      for (const output of state.outputs) {
        const option = document.createElement('option');
        option.value = output.id;
        option.textContent = `${output.dir}/${output.name}`;
        els.outputSelect.appendChild(option);
      }
    }

    async function loadOutputById(id) {
      const response = await fetch(`/api/output?file=${encodeURIComponent(id)}&public=true`);
      const output = await response.json();
      setOutput(output);
      els.outputSelect.value = id;
    }

    function setOutput(output) {
      state.output = output;
      state.results = deriveResults(output);
      state.selectedIndex = 0;
      renderAll();
    }

    function renderAll() { renderSummary(); renderResultList(); renderDetail(); }

    function renderSummary() {
      const output = state.output;
      if (!output) { els.summary.innerHTML = ''; return; }
      els.summary.innerHTML = `
        <div class="muted">${output.search_name || 'triage output'} · ${output.city || ''}</div>
        <div class="stats">
          <div class="stat"><b>${formatNumber(output.scraped_count)}</b><span>scraped</span></div>
          <div class="stat"><b>${formatNumber(output.eligible_count)}</b><span>eligible</span></div>
          <div class="stat"><b>${formatNumber(output.filtered_out_count)}</b><span>filtered out</span></div>
          <div class="stat"><b>${formatNumber(output.gpt_analyzed_count)}</b><span>GPT analyzed</span></div>
        </div>`;
    }

    function renderResultList() {
      els.resultList.innerHTML = '';
      state.results.forEach((result, index) => {
        const listing = listingOf(result);
        const item = document.createElement('div');
        item.className = `result-item ${index === state.selectedIndex ? 'active' : ''}`;
        item.innerHTML = `
          <h3>${index + 1}. ${getTitle(result)}</h3>
          <div class="chips">
            <span class="chip">${getArea(result)}</span>
            <span class="chip">Score ${formatNumber(result.ranking_score ?? result.score)}</span>
            <span class="chip">${formatMoney(listing.price ?? result.price)}</span>
            <span class="chip">${formatNumber(listing.size ?? result.size_mq, ' mq')}</span>
            <span class="chip ${getActionClass(result.gpt_analysis?.recommended_action ?? result.action)}">${result.gpt_analysis?.recommended_action ?? result.action ?? '—'}</span>
          </div>`;
        item.addEventListener('click', () => { state.selectedIndex = index; renderAll(); });
        els.resultList.appendChild(item);
      });
    }

    function renderDetail() {
      const result = state.results[state.selectedIndex];
      if (!result) { els.main.innerHTML = '<div class="empty">No results in this output.</div>'; return; }
      const analysis = result.gpt_analysis || {};
      const spread = result.spread || {};
      const listing = listingOf(result);

      els.main.innerHTML = `
        <div class="hero">
          <div>
            <div class="muted">Result ${state.selectedIndex + 1} / ${state.results.length} · ${getArea(result)}</div>
            <h2>${getTitle(result)}</h2>
            <div class="chips">
              <span class="chip ${getActionClass(analysis.recommended_action ?? result.action)}">${analysis.recommended_action ?? result.action ?? '—'}</span>
              <span class="chip">${listing.status ? `Condition ${listing.status}` : 'Condition —'}</span>
              <span class="chip">${listing.propertyType ? `Type ${listing.propertyType}` : 'Type —'}</span>
            </div>
          </div>
        </div>

        <div class="meta-grid">
          <div class="metric"><span>Price</span><b>${formatMoney(listing.price)}</b></div>
          <div class="metric"><span>Size</span><b>${formatNumber(listing.size, ' mq')}</b></div>
          <div class="metric"><span>Price / mq</span><b>${formatMoney(listing.priceByArea)}</b></div>
          <div class="metric"><span>Score</span><b>${formatNumber(result.ranking_score ?? result.score)}</b></div>
          <div class="metric"><span>Floor</span><b>${listing.floor ?? '—'}</b></div>
          <div class="metric"><span>Bathrooms</span><b>${listing.bathrooms ?? result.door_engine?.basics?.bathrooms ?? '—'}</b></div>
          <div class="metric"><span>Final units</span><b>${formatNumber(result.door_engine?.estimatedFinalUnits)}</b></div>
          <div class="metric"><span>ROI base</span><b>${formatNumber(spread.roi_base_pct ?? result.roi_base_pct, '%')}</b></div>
        </div>

        <div class="detail-grid">
          ${renderArray('Positive signals', analysis.positive_signals)}
          ${renderArray('Red flags', analysis.red_flags, 'red-flags')}
          ${renderArray('Missing information', analysis.missing_information)}
          ${renderArray('Due diligence questions', analysis.human_due_diligence_questions)}
          <section class="detail-block">
            <h3>Public listing snapshot</h3>
            <div class="chips">
              <span class="chip">Area ${getArea(result)}</span>
              <span class="chip">Rooms ${listing.rooms ?? '—'}</span>
              <span class="chip">Lift ${listing.hasLift === true ? 'yes' : listing.hasLift === false ? 'no' : '—'}</span>
              <span class="chip">Plan ${listing.hasPlan === true ? 'yes' : listing.hasPlan === false ? 'no' : '—'}</span>
            </div>
          </section>
        </div>`;
    }

    function move(delta) {
      if (!state.results.length) return;
      state.selectedIndex = (state.selectedIndex + delta + state.results.length) % state.results.length;
      renderAll();
    }

    els.outputSelect.addEventListener('change', (event) => loadOutputById(event.target.value));
    els.refreshButton.addEventListener('click', loadOutputList);
    els.prevButton.addEventListener('click', () => move(-1));
    els.nextButton.addEventListener('click', () => move(1));
    window.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft') move(-1);
      if (event.key === 'ArrowRight') move(1);
    });
    loadOutputList().catch((error) => { els.main.innerHTML = `<div class="empty">${error.message}</div>`; });
  </script>
</body>
</html>
