<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TORIUM Public</title><style>:root{--bg:#f4f1ea;--panel:#fffaf0;--card:#fff;--ink:#171717;--muted:#716b61;--line:#dfd5c5;--accent:#111;--chip:#eee4d3}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}.app{min-height:100vh;display:grid;grid-template-columns:390px 1fr}aside{background:var(--panel);border-right:1px solid var(--line);padding:18px;overflow:auto;max-height:100vh;position:sticky;top:0}main{padding:24px}.card,.item,.metric{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 30px #0000000a}.card{padding:12px;margin-bottom:12px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.brand h1{font-size:20px;margin:0}.muted,.brand span{color:var(--muted);font-size:12px}button,select{border:1px solid var(--line);border-radius:12px;background:#fff;padding:9px 11px;font:inherit}button{cursor:pointer}.primary{background:var(--accent);color:#fff;border-color:var(--accent)}select{width:100%;margin-top:8px}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.stat{background:#f9f4ea;border:1px solid #eadfcd;border-radius:14px;padding:10px}.stat b{font-size:18px;display:block}.list{display:grid;gap:10px}.item{padding:12px;cursor:pointer}.item.active{outline:2px solid #111}.item h3{font-size:14px;margin:0 0 8px}.chips{display:flex;gap:6px;flex-wrap:wrap}.chip{font-size:11px;border-radius:999px;background:var(--chip);padding:5px 7px}.hero{display:grid;gap:14px;margin-bottom:16px}.hero h2{font-size:clamp(28px,4vw,48px);line-height:.98;letter-spacing:-.055em;margin:0 0 10px}.hero-img{width:100%;height:330px;object-fit:cover;border-radius:18px;border:1px solid var(--line)}.gallery{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.gallery img{width:100%;height:92px;object-fit:cover;border-radius:12px;border:1px solid var(--line)}.meta{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}.metric{padding:14px}.metric span{display:block;color:var(--muted);font-size:12px}.metric b{font-size:22px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.block{padding:16px}.block h3{margin:0 0 10px}.block p{margin:0;line-height:1.45}.plans{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.plans img{width:100%;max-height:520px;object-fit:contain;border-radius:16px;border:1px solid var(--line);background:#fff}.empty{text-align:center;color:var(--muted);padding:36px}@media(max-width:980px){.app{grid-template-columns:1fr}aside{position:static;max-height:none;border-right:0;border-bottom:1px solid var(--line)}.meta{grid-template-columns:repeat(2,1fr)}.grid,.plans{grid-template-columns:1fr}.gallery{grid-template-columns:repeat(3,1fr)}}</style></head><body><div class="app"><aside><div class="top brand"><div><h1>TORIUM Public</h1><span>Redacted deal browser</span></div><button id="refresh">↻</button></div><div class="card muted">Exact addresses, external listing links and Idealista source tags are hidden.</div><div class="card"><div class="top"><button id="prev">← Prev</button><button id="next" class="primary">Next →</button></div><select id="outputs"></select></div><div id="summary" class="card"></div><div id="list" class="list"></div></aside><main id="main"><div class="empty">Loading…</div></main></div><script>const state={outs:[],out:null,results:[],i:0};const $=id=>document.getElementById(id);const money=new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',maximumFractionDigits:0});const num=new Intl.NumberFormat('it-IT');const qs=new URLSearchParams(location.search);const wantedRun=qs.get('run_id')||qs.get('run');const wantedProperty=qs.get('property');const h=x=>String(x??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const u=x=>{try{const v=new URL(String(x),location.href);return ['http:','https:'].includes(v.protocol)?h(v.href):''}catch{return''}};const fm=v=>Number.isFinite(Number(v))?money.format(Number(v)):'—';const fn=(v,s='')=>Number.isFinite(Number(v))?num.format(Number(v))+s:'—';const listing=r=>r?.listing||r||{};const arr=x=>Array.isArray(x)?x:[];const noIdeal=x=>arr(x).filter(v=>!String(v).toLowerCase().includes('idealista'));const results=o=>arr(o?.results).length?o.results:arr(o?.result_links);const idOf=(r,i)=>String(r?.id??r?.listing_index??i);const title=r=>h(r?.title||listing(r)?.suggestedTexts?.title||listing(r)?.title||'Redacted property');const area=r=>h(listing(r)?.listing_area||listing(r)?.area_label||listing(r)?.neighborhood||listing(r)?.district||r?.listing_area||r?.area||r?.query_area||'Milano');const photos=r=>arr(r?.photos).length?r.photos:arr(r?.listing?.photos);const plans=r=>arr(r?.floor_plans).length?r.floor_plans:arr(r?.listing?.floor_plans);const desc=r=>h(r?.description||r?.listing?.description||'');function renderArray(t,items){items=noIdeal(items);return items.length?`<section class="card block"><h3>${h(t)}</h3><ul>${items.slice(0,8).map(x=>`<li>${h(x)}</li>`).join('')}</ul></section>`:''}async function loadOutputs(){const r=await fetch('/api/outputs');const d=await r.json();state.outs=d.outputs||[];$('outputs').innerHTML=state.outs.map(o=>`<option value="${h(o.id)}">${h(o.dir+'/'+o.name)}</option>`).join('');if(wantedRun)await loadOutput(wantedRun.startsWith('supabase:')?wantedRun:'supabase:'+wantedRun);else if(state.outs[0])await loadOutput(state.outs[0].id)}async function loadOutput(id){const r=await fetch('/api/output?file='+encodeURIComponent(id)+'&t='+Date.now());const o=await r.json();state.out=o;state.results=results(o);state.i=0;if(wantedProperty){const k=state.results.findIndex((r,i)=>idOf(r,i)===wantedProperty||String(r.share_url||'').includes('property='+wantedProperty));if(k>=0)state.i=k}$('outputs').value=id;draw()}function draw(){drawSummary();drawList();drawDetail()}function drawSummary(){const o=state.out||{};$('summary').innerHTML=`<div class="muted">${h(o.search_name||'triage output')} · ${h(o.city||'')}</div><div class="stats"><div class="stat"><b>${fn(o.scraped_count)}</b><span>scraped</span></div><div class="stat"><b>${fn(o.eligible_count)}</b><span>eligible</span></div><div class="stat"><b>${fn(o.filtered_out_count)}</b><span>filtered</span></div><div class="stat"><b>${fn(o.gpt_analyzed_count)}</b><span>GPT</span></div></div>`}function drawList(){$('list').innerHTML=state.results.map((r,i)=>{const l=listing(r);return `<div class="item ${i===state.i?'active':''}" data-i="${i}"><h3>${i+1}. ${title(r)}</h3><div class="chips"><span class="chip">${area(r)}</span><span class="chip">Score ${fn(r.ranking_score??r.score??r.door_engine?.doorScore)}</span><span class="chip">${fm(l.price??r.price_eur??r.price)}</span><span class="chip">${fn(l.size??r.size_mq,' mq')}</span><span class="chip">${photos(r).length} photos</span><span class="chip">${plans(r).length} plans</span></div></div>`}).join('');document.querySelectorAll('.item').forEach(el=>el.onclick=()=>{state.i=Number(el.dataset.i);draw()})}function img(url,cls=''){const src=u(url);return src?`<img class="${cls}" src="${src}" loading="lazy" alt="property image">`:''}async function share(r,i){const link=new URL(location.href);link.searchParams.set('property',idOf(r,i));const data={title:title(r).replace(/<[^>]+>/g,''),text:desc(r)||'TORIUM property analysis',url:link.href};if(navigator.share)await navigator.share(data);else{await navigator.clipboard.writeText(data.url);document.getElementById('share').textContent='Copied'}}function drawDetail(){const r=state.results[state.i];if(!r){$('main').innerHTML='<div class="empty">No results.</div>';return}const l=listing(r),a=r.gpt_analysis||{},s=r.spread||{},p=photos(r),pl=plans(r),hero=p[0]?.url||l.thumbnail||r.thumbnail_url;$('main').innerHTML=`<div class="hero"><div class="top"><div><div class="muted">Result ${state.i+1} / ${state.results.length} · ${area(r)}</div><h2>${title(r)}</h2><div class="chips"><span class="chip">${h(a.recommended_action??r.action??'—')}</span><span class="chip">${h(l.status||'condition —')}</span><span class="chip">${h(l.propertyType||'type —')}</span></div></div><button class="primary" id="share">Share</button></div>${img(hero,'hero-img')}${p.length?`<div class="gallery">${p.slice(0,12).map(x=>img(x.url)).join('')}</div>`:''}</div><div class="meta"><div class="metric"><span>Price</span><b>${fm(l.price??r.price_eur)}</b></div><div class="metric"><span>Size</span><b>${fn(l.size??r.size_mq,' mq')}</b></div><div class="metric"><span>Price / mq</span><b>${fm(l.priceByArea??r.price_by_area)}</b></div><div class="metric"><span>Score</span><b>${fn(r.ranking_score??r.score??r.door_engine?.doorScore)}</b></div><div class="metric"><span>Floor</span><b>${h(l.floor??r.floor??'—')}</b></div><div class="metric"><span>Bathrooms</span><b>${h(l.bathrooms??r.bathrooms??'—')}</b></div><div class="metric"><span>Final units</span><b>${fn(r.door_engine?.estimatedFinalUnits??r.estimated_final_units)}</b></div><div class="metric"><span>ROI base</span><b>${fn(s.roi_base_pct??r.roi_base_pct,'%')}</b></div></div><div class="grid">${desc(r)?`<section class="card block"><h3>Description</h3><p>${desc(r)}</p></section>`:''}${pl.length?`<section class="card block"><h3>Floor plan</h3><div class="plans">${pl.map(x=>img(x.url)).join('')}</div></section>`:''}${renderArray('Positive signals',a.positive_signals)}${renderArray('Red flags',a.red_flags)}${renderArray('Missing information',a.missing_information)}${renderArray('Due diligence questions',a.human_due_diligence_questions)}</div>`;$('share').onclick=()=>share(r,state.i)}function move(d){if(!state.results.length)return;state.i=(state.i+d+state.results.length)%state.results.length;draw()}$('outputs').onchange=e=>loadOutput(e.target.value);$('refresh').onclick=loadOutputs;$('prev').onclick=()=>move(-1);$('next').onclick=()=>move(1);addEventListener('keydown',e=>{if(e.key==='ArrowLeft')move(-1);if(e.key==='ArrowRight')move(1)});loadOutputs().catch(e=>$('main').innerHTML='<div class="empty">'+h(e.message)+'</div>');</script></body></html>
