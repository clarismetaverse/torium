<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TORIUM Triage Viewer</title>
  <style>
    :root { --bg:#f4f0e8; --card:#fffaf2; --line:#ded3c2; --ink:#171717; --muted:#70685c; --good:#0f6b3d; --warn:#9b5c00; --bad:#9b1c1c; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--bg); color:var(--ink); }
    .app { min-height:100vh; display:grid; grid-template-columns:360px 1fr; }
    aside { background:var(--card); border-right:1px solid var(--line); padding:18px; overflow:auto; max-height:100vh; position:sticky; top:0; }
    main { padding:24px; overflow:auto; }
    h1 { margin:0; font-size:20px; letter-spacing:-.03em; }
    h2 { margin:6px 0 12px; font-size:clamp(28px,4vw,48px); line-height:.96; letter-spacing:-.06em; }
    h3 { margin:0 0 10px; font-size:15px; }
    .muted { color:var(--muted); }
    .topbar, .box, .item, .metric, .block { background:white; border:1px solid var(--line); border-radius:18px; box-shadow:0 12px 30px rgba(0,0,0,.04); }
    .topbar, .box { padding:12px; margin:12px 0; }
    .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .between { justify-content:space-between; }
    button, select, input[type=file]::file-selector-button { border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:12px; padding:9px 10px; font:inherit; cursor:pointer; }
    button.primary { background:#151515; color:white; border-color:#151515; }
    select { width:100%; margin-top:8px; }
    .stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    .stat { background:#f9f3e9; border:1px solid #eadfce; border-radius:14px; padding:10px; }
    .stat b { display:block; font-size:18px; }
    .stat span { font-size:12px; color:var(--muted); }
    .list { display:grid; gap:10px; }
    .item { padding:12px; cursor:pointer; }
    .item.active { outline:2px solid #111; }
    .item h3 { font-size:14px; line-height:1.25; }
    .chips { display:flex; gap:6px; flex-wrap:wrap; }
    .chip { font-size:11px; padding:5px 7px; border-radius:999px; background:#eee4d3; white-space:nowrap; }
    .chip.good { background:#def3e7; color:var(--good); }
    .chip.warn { background:#fff0d2; color:var(--warn); }
    .chip.bad { background:#ffe0dc; color:var(--bad); }
    .hero { display:grid; grid-template-columns:1fr auto; gap:18px; align-items:start; margin-bottom:14px; }
    .metrics { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin:16px 0; }
    .metric { padding:14px; }
    .metric span { color:var(--muted); font-size:12px; display:block; }
    .metric b { font-size:22px; display:block; margin-top:4px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .block { padding:16px; }
    .block ul { margin:0; padding-left:18px; }
    .block li { margin:6px 0; line-height:1.35; }
    .unit { border:1px solid var(--line); border-radius:14px; padding:12px; margin-bottom:8px; }
    .unit p { margin:6px 0 0; color:var(--muted); font-size:13px; line-height:1.4; }
    pre { white-space:pre-wrap; overflow:auto; background:#161616; color:#f6f1e8; border-radius:14px; padding:12px; font-size:12px; max-height:320px; }
    .empty { padding:36px; text-align:center; color:var(--muted); }
    @media(max-width:920px){ .app{grid-template-columns:1fr} aside{position:static;max-height:none;border-right:0;border-bottom:1px solid var(--line)} .hero,.grid{grid-template-columns:1fr} .metrics{grid-template-columns:1fr 1fr} }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="row between"><div><h1>TORIUM Triage</h1><div class="muted">Vercel MVP</div></div><button id="refresh">↻</button></div>
      <div class="topbar"><div class="row between"><button id="prev">← Prev</button><button id="next" class="primary">Next →</button></div><select id="outputs"></select></div>
      <div class="box"><div class="muted">Drop a JSON here or load manually.</div><br><input id="file" type="file" accept="application/json,.json"></div>
      <div id="summary" class="box"></div>
      <div id="list" class="list"></div>
    </aside>
    <main id="main"><div class="empty">Loading outputs…</div></main>
  </div>
<script>
const state={outputs:[],output:null,results:[],i:0};
const $=id=>document.getElementById(id);
const money=new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',maximumFractionDigits:0});
const num=new Intl.NumberFormat('it-IT');
const fm=v=>Number.isFinite(Number(v))?money.format(Number(v)):'—';
const fn=(v,s='')=>Number.isFinite(Number(v))?num.format(Number(v))+s:'—';
const title=r=>r?.title||r?.listing?.suggestedTexts?.title||r?.listing?.address||'Untitled';
const url=r=>r?.url||r?.idealista_url||r?.listing?.url||'';
const action=r=>r?.gpt_analysis?.recommended_action||r?.action||'—';
const actionClass=a=>String(a).includes('discard')?'bad':String(a).includes('request')?'warn':'good';
function results(o){return Array.isArray(o?.results)&&o.results.length?o.results:(Array.isArray(o?.result_links)?o.result_links:[])}
async function loadOutputs(){
  const data=await fetch('/api/outputs').then(r=>r.json());
  state.outputs=data.outputs||[];
  $('outputs').innerHTML=state.outputs.map(o=>`<option value="${o.id}">${o.dir}/${o.name}</option>`).join('')||'<option>No outputs found</option>';
  if(state.outputs[0]) await loadById(state.outputs[0].id); else $('main').innerHTML='<div class="empty">No JSON found in triage-outputs.</div>';
}
async function loadById(id){ const o=await fetch('/api/output?file='+encodeURIComponent(id)).then(r=>r.json()); setOutput(o); $('outputs').value=id; }
function setOutput(o){ state.output=o; state.results=results(o); state.i=0; render(); }
function render(){ renderSummary(); renderList(); renderDetail(); }
function renderSummary(){ const o=state.output||{}; $('summary').innerHTML=`<div class="muted">${o.search_name||''} · ${o.city||''}</div><div class="stats"><div class="stat"><b>${fn(o.scraped_count)}</b><span>scraped</span></div><div class="stat"><b>${fn(o.eligible_count)}</b><span>eligible</span></div><div class="stat"><b>${fn(o.filtered_out_count)}</b><span>filtered</span></div><div class="stat"><b>${fn(o.gpt_analyzed_count)}</b><span>GPT</span></div></div>`; }
function renderList(){ $('list').innerHTML=state.results.map((r,i)=>`<div class="item ${i===state.i?'active':''}" onclick="pick(${i})"><h3>${i+1}. ${title(r)}</h3><div class="chips"><span class="chip">Score ${fn(r.ranking_score??r.score)}</span><span class="chip">${fm(r.listing?.price??r.price)}</span><span class="chip">${fn(r.listing?.size??r.size_mq,' mq')}</span><span class="chip good">ROI ${fn(r.spread?.roi_base_pct??r.roi_base_pct,'%')}</span><span class="chip ${actionClass(action(r))}">${action(r)}</span></div></div>`).join(''); }
function arr(name,items){return Array.isArray(items)&&items.length?`<section class="block"><h3>${name}</h3><ul>${items.map(x=>`<li>${String(x)}</li>`).join('')}</ul></section>`:''}
function units(items){return Array.isArray(items)&&items.length?`<section class="block"><h3>Final unit plan</h3>${items.map((u,i)=>`<div class="unit"><b>${i+1}. ${u.unit_type||'unit'} · ${fn(u.estimated_size_mq,' mq')}</b><div class="chips"><span class="chip">Low ${fm(u.sale_value_low_eur)}</span><span class="chip good">Base ${fm(u.sale_value_base_eur)}</span><span class="chip">High ${fm(u.sale_value_high_eur)}</span></div><p>${u.valuation_reasoning||''}</p></div>`).join('')}</section>`:''}
function renderDetail(){
  const r=state.results[state.i]; if(!r){$('main').innerHTML='<div class="empty">No results.</div>';return}
  const a=r.gpt_analysis||{}, s=r.spread||{}, l=r.listing||r, u=url(r);
  $('main').innerHTML=`<div class="hero"><div><div class="muted">Result ${state.i+1}/${state.results.length}</div><h2>${title(r)}</h2><div class="chips"><span class="chip ${actionClass(action(r))}">${action(r)}</span><span class="chip">Fractioning ${a.fractioning_confidence||'—'}</span><span class="chip">Valuation ${a.valuation_confidence||'—'}</span></div></div>${u?`<a href="${u}" target="_blank"><button class="primary">Open Idealista ↗</button></a>`:''}</div><div class="metrics"><div class="metric"><span>Price</span><b>${fm(l.price)}</b></div><div class="metric"><span>Size</span><b>${fn(l.size,' mq')}</b></div><div class="metric"><span>Spread</span><b>${fm(s.spread_base_eur??r.spread_base_eur)}</b></div><div class="metric"><span>ROI</span><b>${fn(s.roi_base_pct??r.roi_base_pct,'%')}</b></div><div class="metric"><span>Project cost</span><b>${fm(s.project_cost_eur)}</b></div><div class="metric"><span>Score</span><b>${fn(r.ranking_score??r.score)}</b></div><div class="metric"><span>Floor</span><b>${l.floor??'—'}</b></div><div class="metric"><span>Bathrooms</span><b>${l.bathrooms??r.door_engine?.basics?.bathrooms??'—'}</b></div></div><div class="grid">${units(a.final_unit_plan)}${arr('Positive signals',a.positive_signals)}${arr('Red flags',a.red_flags)}${arr('Missing information',a.missing_information)}${arr('Due diligence questions',a.human_due_diligence_questions)}<section class="block"><h3>Door engine</h3><div class="chips"><span class="chip">Door ${fn(r.door_engine?.doorScore)}</span><span class="chip">Final units ${fn(r.door_engine?.estimatedFinalUnits)}</span><span class="chip">New units ${fn(r.door_engine?.newUnitsCreated)}</span></div>${arr('',r.door_engine?.doorScoreReasons).replace('<h3></h3>','')}</section><section class="block"><h3>Raw snapshot</h3><pre>${JSON.stringify({address:l.address,price:l.price,size:l.size,floor:l.floor,status:l.status,url:u},null,2)}</pre></section></div>`;
}
function pick(i){state.i=i;render()}
function move(d){if(!state.results.length)return; state.i=(state.i+d+state.results.length)%state.results.length; render()}
$('outputs').onchange=e=>loadById(e.target.value); $('refresh').onclick=loadOutputs; $('prev').onclick=()=>move(-1); $('next').onclick=()=>move(1);
$('file').onchange=e=>{const f=e.target.files[0]; if(f) f.text().then(t=>setOutput(JSON.parse(t)))};
document.body.ondragover=e=>e.preventDefault(); document.body.ondrop=e=>{e.preventDefault(); const f=e.dataTransfer.files[0]; if(f) f.text().then(t=>setOutput(JSON.parse(t)))};
window.onkeydown=e=>{if(e.key==='ArrowLeft')move(-1); if(e.key==='ArrowRight')move(1)};
window.pick=pick; loadOutputs().catch(e=>$('main').innerHTML='<div class="empty">'+e.message+'</div>');
</script>
</body>
</html>
